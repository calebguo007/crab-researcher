services:
  - type: web
    name: crab-researcher-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: MOONSHOT_API_KEY
        sync: false
      - key: FEISHU_WEBHOOK_URL
        sync: false
      - key: FEISHU_WEBHOOK_SECRET
        sync: false
