# CrabRes MCP Server — AI Growth Strategy Agent
# https://smithery.ai

name: crabres
version: 2.0.0
description: "Your AI CMO. Research real competitors by name, find where target users discuss your niche on Reddit/X/HN, and get actionable growth plans with ready-to-publish content. Not templates — personalized strategies based on live internet research. 13 expert agents (economist, psychologist, copywriter...) debate your strategy before delivery."
vendor: CrabRes
homepage: https://crabres.com
repository: https://github.com/velmavalienteqejimu22-jpg/crab-researcher

transport:
  type: http
  url: https://crab-researcher.onrender.com/api/mcp

tools:
  - name: analyze_growth
    description: "Full growth analysis: research competitors, find target users on Reddit/X/HN/XHS, calculate CAC/LTV, and create a 90-day growth plan with copy-paste content for each channel."
    
  - name: find_competitors
    description: "Find and deep-analyze competitors: pricing, features, traffic sources, social presence, user reviews. Returns actionable competitive intelligence, not generic lists."
    
  - name: find_target_users
    description: "Discover exactly where target users discuss problems your product solves. Searches Reddit (specific subreddits with subscriber counts), HN, X, ProductHunt, LinkedIn, 小红书, 知乎."

  - name: quick_advice
    description: "Fast growth direction without deep search. Good for brainstorming. Returns top 3 channels + one uncomfortable truth about your market position."

